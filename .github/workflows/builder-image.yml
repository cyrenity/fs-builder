name: Build & push fs-mod-builder

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.fs-builder
      - .github/workflows/builder-image.yml
  workflow_dispatch:
    inputs:
      fs_version:
        description: FreeSWITCH source tag (e.g. v1.11.0)
        required: true
        default: v1.11.0
      debian_release:
        description: Debian release codename (e.g. trixie, bookworm)
        required: true
        default: trixie

permissions:
  contents: read
  packages: write

jobs:
  build:
    # Multi-arch build emits two manifests; we build each on its native runner
    # for speed (arm64 image takes ~12 min native vs ~80 min under QEMU) and
    # stitch them together in the `merge` job below.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        run: |
          fs_version="${{ inputs.fs_version || 'v1.11.0' }}"
          debian_release="${{ inputs.debian_release || 'trixie' }}"
          fs_short="${fs_version#v}"
          image="ghcr.io/${{ github.repository_owner }}/fs-mod-builder"
          echo "image=$image"                                       >> $GITHUB_OUTPUT
          echo "fs_version=$fs_version"                             >> $GITHUB_OUTPUT
          echo "debian_release=$debian_release"                     >> $GITHUB_OUTPUT
          echo "version_tag=${fs_short}-${debian_release}"          >> $GITHUB_OUTPUT

      - name: Build & push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fs-builder
          platforms: ${{ matrix.platform }}
          build-args: |
            FS_VERSION=${{ steps.meta.outputs.fs_version }}
            DEBIAN_RELEASE=${{ steps.meta.outputs.debian_release }}
          push: true
          # Per-arch tag — combined into a manifest list in the merge job.
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        run: |
          fs_version="${{ inputs.fs_version || 'v1.11.0' }}"
          debian_release="${{ inputs.debian_release || 'trixie' }}"
          fs_short="${fs_version#v}"
          image="ghcr.io/${{ github.repository_owner }}/fs-mod-builder"
          echo "image=$image"                                >> $GITHUB_OUTPUT
          echo "version_tag=${fs_short}-${debian_release}"   >> $GITHUB_OUTPUT

      - name: Create & push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }} \
            -t ${{ steps.meta.outputs.image }}:latest \
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}-amd64 \
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}-arm64

      - name: Print resulting manifest
        run: |
          docker buildx imagetools inspect \
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version_tag }}
